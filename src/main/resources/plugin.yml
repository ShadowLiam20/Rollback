name: RollbackPlugin
version: 1.0
main: com.shadow.rollback.RollbackPlugin
api-version: 1.20
commands:
  rollback:
    description: Roll back blocks, entities, or both over a given time period
    usage: /rollback <blocks|entities|inventory|all> <tijd> [radius=20] [player=Naam] [world=world] | /rollback reload
    permission: rollback.use
permissions:
  rollback.use:
    description: Allows use of rollback commands
    default: op
