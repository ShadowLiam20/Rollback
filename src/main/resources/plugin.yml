name: RollbackPlugin
version: '1.0'
main: com.shadow.rollback.RollbackPlugin
api-version: '1.20'
commands:
  rollbacks:
    description: Lookup, rollback, restore and purge rollback history
    usage: /rollbacks <lookup|rollback|restore|purge|reload>
    permission: rollback.use
permissions:
  rollback.use:
    description: Allows use of rollback commands
    default: op
